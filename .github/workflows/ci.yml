name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install pytest pillow
      - run: python -m pytest tests/ -q
      - run: |
          python reference/calc.py
          python reference/char_ops.py
          python reference/verify.py
      - run: pip install . && python -c "from paper_principle import calc, count_letter, verify_answer; assert calc('17 × 23 − 4³')[0] == 327"
